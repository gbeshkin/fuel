<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fuel prices</title>

  <link rel="stylesheet" href="style.css" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header class="wrap">
    <div class="headerRow">
      <div>
        <h1>Fuel prices</h1>
        <div class="sub">Data is updated every hour</div>
      </div>

      <div class="badges">
        <span class="badge" id="badgeUpdated">—</span>
        <span class="badge" id="badgeCity">All city</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="controls">
      <label>
        City:
        <input id="cityInput" list="cityList" placeholder="Choose city..." />
        <datalist id="cityList">
          <option value="All"></option>
        </datalist>
      </label>

      <label class="search">
        Search (station/address):
        <input id="q" type="search" placeholder="example: Neste, Circle K, Tartu mnt..." />
      </label>

      <label>
        Sort:
        <select id="sortSelect">
          <option value="station">Gas station (A→Z)</option>
          <option value="p95">95</option>
          <option value="p98">98</option>
          <option value="diesel">Diesel</option>
          <option value="lpg">LPG</option>
          <option value="cng">CNG</option>
          <option value="delta">Δ (delta)</option>
        </select>
      </label>

      <div class="meta" id="meta"></div>
    </section>

    <section class="stack">
      <div class="card">
        <div class="cardTitleRow">
          <h2>Map</h2>
        </div>
        <div id="map"></div>
      </div>

      <div class="card">
        <div class="cardTitleRow">
          <h2>Table by Gas stations</h2>
          <div class="hint">95 / 98 / Diesel / LPG / CNG</div>
        </div>

        <div class="tableWrap">
          <table id="tblStations">
            <thead>
              <tr>
                <th class="col-station">Gas station</th>
                <th class="col-city">City</th>
                <th class="col-fuel">95</th>
                <th class="col-fuel">98</th>
                <th class="col-fuel">Diesel</th>
                <th class="col-fuel">LPG</th>
                <th class="col-fuel">CNG</th>
                <th class="col-delta">Δ</th>
              </tr>
            </thead>
            <tbody>
              <!-- rows -->
            </tbody>
          </table>
        </div>

        <div class="legend">
          <span class="chip chipUp">↑ price increase</span>
          <span class="chip chipDown">↓ price reduction</span>
          <span class="chip chipFlat">→ no changes</span>
          <span class="chip chipNone">— no data</span>
        </div>
      </div>
    </section>
  </main>

  <!-- Leaflet -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="app.js"></script>

  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-QqG83e4jDk3z4cXfoYKQM.js"></script>
  <script>
    window.plausible = window.plausible || function () {
      (plausible.q = plausible.q || []).push(arguments);
    };
    plausible.init = plausible.init || function (i) {
      plausible.o = i || {};
    };
    plausible.init();
  </script>
</body>
</html>
