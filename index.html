<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Цены на топливо</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header class="wrap">
    <div class="headerRow">
      <div>
        <h1>Цены на топливо</h1>
        <div class="sub">Данные обновляются каждый час.</div>
      </div>

      <div class="badges">
        <span class="badge" id="badgeUpdated">—</span>
        <span class="badge" id="badgeCity">Все города</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="controls">
      <label>
        Город:
        <input id="cityInput" list="cityList" placeholder="Введите город..." />
        <datalist id="cityList">
          <option value="Все"></option>
        </datalist>
      </label>

      <label class="search">
        Поиск (станция/адрес):
        <input id="q" type="search" placeholder="например: Neste, Circle K, Tartu mnt..." />
      </label>

      <label>
        Сортировка:
        <select id="sortSelect">
          <option value="station">Станция (A→Z)</option>
          <option value="p95">Цена 95</option>
          <option value="p98">Цена 98</option>
          <option value="diesel">Цена Diesel</option>
          <option value="lpg">LPG</option>
          <option value="cng">CNG</option>
          <option value="delta">Δ (изменение)</option>
        </select>
      </label>

      <div class="meta" id="meta"></div>
    </section>

    <section class="stack">
      <div class="card">
        <div class="cardTitleRow">
          <h2>Карта</h2>
          <div class="hint">Клик по строке в таблице — фокус на станции</div>
        </div>
        <div id="map"></div>
      </div>

      <div class="card">
        <div class="cardTitleRow">
          <h2>Таблица по станциям</h2>
          <div class="hint">Показаны 95 / 98 / Diesel / LPG / CNG</div>
        </div>

        <div class="tableWrap">
          <table id="tblStations">
            <thead>
              <tr>
                <th class="col-station">Станция</th>
                <th class="col-city">Город</th>
                <th class="col-fuel">95</th>
                <th class="col-fuel">98</th>
                <th class="col-fuel">Diesel</th>
                <th class="col-fuel">LPG</th>
                <th class="col-fuel">CNG</th>
                <th class="col-delta">Δ</th>
              </tr>
            </thead>
            <tbody>
              <!-- rows -->
            </tbody>
          </table>
        </div>

        <div class="legend">
          <span class="chip chipUp">↑ рост</span>
          <span class="chip chipDown">↓ снижение</span>
          <span class="chip chipFlat">→ без изменений</span>
          <span class="chip chipNone">— нет данных</span>
        </div>
      </div>
    </section>
  </main>

  <!-- Leaflet -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="app.js"></script>

  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-QqG83e4jDk3z4cXfoYKQM.js"></script>
  <script>
    window.plausible = window.plausible || function () {
      (plausible.q = plausible.q || []).push(arguments);
    };
    plausible.init = plausible.init || function (i) {
      plausible.o = i || {};
    };
    plausible.init();
  </script>
</body>
</html>
